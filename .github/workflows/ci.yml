name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Product gate: pure assembly library only
  libvge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build libvge (asm only)
        run: make clean && make all
      - name: pure-asm smoke (no C, no Rust, no libc)
        run: make test
      - name: symbols present
        run: nm build/libvge.a | grep -E ' T vge_(plot|line|circle|clear)$$'

  # Optional demo bindings — not the library
  demo-rust:
    runs-on: ubuntu-latest
    needs: libvge
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo test (FFI wrapper only)
        run: cargo test --all-features
